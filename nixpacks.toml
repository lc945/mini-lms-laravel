[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.curl", "php84Extensions.zip", "composer"]

[phases.build]
cmds = ["php8.4 $(which composer) install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php8.4 artisan serve --host=0.0.0.0 --port=$PORT"
