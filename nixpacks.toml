[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.curl", "php84Extensions.zip", "php84Packages.composer"]

[phases.build]
cmds = ["php artisan config:clear"]

[start]
cmd = "php artisan migrate:fresh --seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
